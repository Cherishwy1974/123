<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 本地化MathJax配置 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                packages: {'[+]': ['ams', 'base']},
                macros: {
                    lim: ['\\mathop{\\rm lim}\\limits', 1],
                    liminf: ['\\mathop{\\rm lim\\,inf}\\limits', 1],
                    limsup: ['\\mathop{\\rm lim\\,sup}\\limits', 1]
                }
            },
            chtml: {
                scale: 1,
                minScale: 0.8,
                matchFontHeight: false,
                mtextInheritFont: true
            },
            startup: {
                ready: () => {
                    MathJax.startup.defaultReady();
                    console.log('MathJax加载完成');
                }
            }
        };
    </script>
    <script async src="../common-assets/js/tex-svg.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蒙提霍尔问题动画演示 - 高等应用数学虚拟实验室</title>

    <!-- 隐藏滚动条样式 -->
    <link rel="stylesheet" href="../common-assets/css/hidden-scrollbar.css">

<style>
        /* 页面特定样式补充 - 使用fullscreen-layout.css统一样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Source Han Serif SC", "Noto Serif CJK SC", "SimSun", serif;
            font-size: 16px;
            line-height: 1.6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 顶部标题栏 */
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: #ffffff;
            padding: 16px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 70px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.025em;
        }

        .header-subtitle {
            font-size: 18px;
            opacity: 0.9;
            font-weight: 400;
            margin: 0;
            margin-left: 16px;
        }

        .content {
            flex: 1;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: hidden; /* 防止滚动条 */
            height: calc(100vh - 70px);
        }

        .game-description {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }

        .description-title {
            display: none;
        }

        .description-text {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }

        .game-area {
            background: linear-gradient(135deg, #f8fbff 0%, #e8f2ff 100%);
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            text-align: center;
            min-height: 300px;
            position: relative;
        }

        .game-title {
            display: none;
        }

        .game-status {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            padding: 8px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }

        .doors-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .door {
            width: 120px;
            height: 160px;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            border: 3px solid #654321;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .door:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .door.selected {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
            transform: scale(1.05);
        }

        .door.opened {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-color: #dee2e6;
            color: #333;
        }

        .door.opened.car {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border-color: #28a745;
            color: white;
        }

        .door.opened.goat {
            background: linear-gradient(135deg, #dc3545 0%, #e83e8c 100%);
            border-color: #dc3545;
            color: white;
        }

        .door-content {
            font-size: 48px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .door.opened .door-content {
            opacity: 1;
        }

        .choice-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .choice-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            min-height: 36px;
            min-width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .choice-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .choice-btn.stay {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .choice-btn.switch {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
        }

        .choice-btn.reset {
            background: linear-gradient(135deg, #dc3545 0%, #e83e8c 100%);
        }

        .statistics {
            background: white;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
            margin-top: 8px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }

        .stat-item {
            text-align: center;
            padding: 8px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 6px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-percentage {
            font-size: 14px;
            color: #999;
        }

        /* MathJax样式 */
        .MathJax, .MathJax_Display, mjx-container, mjx-math {
            font-size: 16px !important;
            font-weight: normal !important;
        }
        
        .MathJax_Display {
            font-size: 18px !important;
        }
        
        .formula-inline {
            display: inline;
        }
        
        .formula-inline .MathJax {
            font-size: 16px !important;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .header-subtitle {
                font-size: 14px;
            }
            
            .content {
                padding: 12px;
                flex-direction: column;
            }
            
            .game-description {
                width: 100%;
            }
            
            .door {
                width: 120px;
                height: 160px;
                font-size: 20px;
            }
            
            .doors-container {
                gap: 15px;
            }
            
            .choice-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .statistics {
                grid-template-columns: 1fr;
            }
        }
    
        /* 美化滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-600);
        }

        ::-webkit-scrollbar-corner {
            background: var(--gray-100);
        }

        /* Firefox 滚动条样式 */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--gray-300) var(--gray-100);
        }</style>
</head>
<body>
    <div class="container fullscreen-container">
        <div class="header">
            <div class="header-title">
                <h1>蒙提霍尔问题动画演示</h1>
                <span class="header-subtitle">通过交互式游戏理解条件概率的经典问题</span>
            </div>
        </div>

        <div class="content">
            <!-- 游戏说明 -->
            <div class="game-description">
                <div class="description-title">游戏规则</div>
                <div class="description-text">
                    有三扇门，其中一扇门后面有汽车，另外两扇门后面有山羊。你选择一扇门后，主持人会打开剩下两扇门中有山羊的一扇。
                    此时你可以选择坚持原来的选择，或者换到另一扇未打开的门。哪种策略获胜概率更高？
                </div>
            </div>
            
            <!-- 游戏区域 -->
            <div class="game-area">
                <div class="game-status" id="game-status">
                    请选择一扇门
                </div>
                
                <div class="doors-container" id="doors-container">
                    <div class="door" data-door="0">
                        <span>门 1</span>
                        <div class="door-content"></div>
                    </div>
                    <div class="door" data-door="1">
                        <span>门 2</span>
                        <div class="door-content"></div>
                    </div>
                    <div class="door" data-door="2">
                        <span>门 3</span>
                        <div class="door-content"></div>
                    </div>
                </div>
                
                <div class="choice-buttons" id="choice-buttons" style="display: none;">
                    <button class="choice-btn stay" id="stay-btn">坚持原选择</button>
                    <button class="choice-btn switch" id="switch-btn">换门</button>
                </div>
                
                <div class="choice-buttons">
                    <button class="choice-btn reset" id="reset-btn">重新开始</button>
                </div>
            </div>
            
            <!-- 统计显示 -->
            <div class="statistics">
                <div class="stat-item">
                    <div class="stat-label">总游戏次数</div>
                    <div class="stat-value" id="total-games">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">坚持原选择</div>
                    <div class="stat-value" id="stay-wins">0</div>
                    <div class="stat-percentage" id="stay-percentage">0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">换门选择</div>
                    <div class="stat-value" id="switch-wins">0</div>
                    <div class="stat-percentage" id="switch-percentage">0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">理论概率</div>
                    <div class="stat-value">坚持: 1/3</div>
                    <div class="stat-value">换门: 2/3</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let gameState = {
            carPosition: 0,
            playerChoice: -1,
            hostOpened: -1,
            gamePhase: 'initial', // initial, host-opened, finished
            totalGames: 0,
            stayWins: 0,
            switchWins: 0
        };

        // 初始化页面
        function initializePage() {
            setupEventListeners();
            resetGame();
            loadStatistics();
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 门的点击事件
            document.querySelectorAll('.door').forEach(door => {
                door.addEventListener('click', (e) => {
                    if (gameState.gamePhase === 'initial') {
                        selectDoor(parseInt(e.currentTarget.dataset.door));
                    }
                });
            });

            // 选择按钮事件
            document.getElementById('stay-btn').addEventListener('click', () => makeChoice('stay'));
            document.getElementById('switch-btn').addEventListener('click', () => makeChoice('switch'));
            document.getElementById('reset-btn').addEventListener('click', resetGame);
        }

        // 重置游戏
        function resetGame() {
            gameState.carPosition = Math.floor(Math.random() * 3);
            gameState.playerChoice = -1;
            gameState.hostOpened = -1;
            gameState.gamePhase = 'initial';

            // 重置门的状态
            document.querySelectorAll('.door').forEach(door => {
                door.classList.remove('selected', 'opened', 'car', 'goat');
                door.querySelector('.door-content').textContent = '';
                door.style.pointerEvents = 'auto';
            });

            // 隐藏选择按钮
            document.getElementById('choice-buttons').style.display = 'none';

            // 更新状态
            updateGameStatus('请选择一扇门');
        }

        // 选择门
        function selectDoor(doorIndex) {
            gameState.playerChoice = doorIndex;

            // 高亮选中的门
            document.querySelectorAll('.door').forEach((door, index) => {
                if (index === doorIndex) {
                    door.classList.add('selected');
                } else {
                    door.classList.remove('selected');
                }
            });

            // 主持人打开一扇有山羊的门
            setTimeout(() => {
                hostOpenDoor();
            }, 1000);

            updateGameStatus('你选择了门 ' + (doorIndex + 1) + '，主持人正在打开一扇门...');
        }

        // 主持人打开门
        function hostOpenDoor() {
            // 找到一扇不是汽车也不是玩家选择的门
            let availableDoors = [];
            for (let i = 0; i < 3; i++) {
                if (i !== gameState.carPosition && i !== gameState.playerChoice) {
                    availableDoors.push(i);
                }
            }

            gameState.hostOpened = availableDoors[Math.floor(Math.random() * availableDoors.length)];

            // 打开门并显示山羊
            const hostDoor = document.querySelector(`[data-door="${gameState.hostOpened}"]`);
            hostDoor.classList.add('opened', 'goat');
            hostDoor.querySelector('.door-content').textContent = '🐐';
            hostDoor.style.pointerEvents = 'none';

            gameState.gamePhase = 'host-opened';

            // 显示选择按钮
            document.getElementById('choice-buttons').style.display = 'flex';

            updateGameStatus('主持人打开了门 ' + (gameState.hostOpened + 1) + '，里面是山羊。你要坚持原选择还是换门？');
        }

        // 做出最终选择
        function makeChoice(choice) {
            let finalChoice;

            if (choice === 'stay') {
                finalChoice = gameState.playerChoice;
            } else {
                // 找到剩下的门
                for (let i = 0; i < 3; i++) {
                    if (i !== gameState.playerChoice && i !== gameState.hostOpened) {
                        finalChoice = i;
                        break;
                    }
                }
            }

            // 打开所有门
            revealAllDoors();

            // 判断胜负
            const won = finalChoice === gameState.carPosition;

            // 更新统计
            gameState.totalGames++;
            if (choice === 'stay' && won) {
                gameState.stayWins++;
            } else if (choice === 'switch' && won) {
                gameState.switchWins++;
            }

            saveStatistics();
            updateStatistics();

            // 显示结果
            setTimeout(() => {
                showResult(won, choice, finalChoice);
            }, 1000);

            gameState.gamePhase = 'finished';
            document.getElementById('choice-buttons').style.display = 'none';
        }

        // 显示所有门的内容
        function revealAllDoors() {
            document.querySelectorAll('.door').forEach((door, index) => {
                if (!door.classList.contains('opened')) {
                    door.classList.add('opened');
                    if (index === gameState.carPosition) {
                        door.classList.add('car');
                        door.querySelector('.door-content').textContent = '🚗';
                    } else {
                        door.classList.add('goat');
                        door.querySelector('.door-content').textContent = '🐐';
                    }
                }
                door.style.pointerEvents = 'none';
            });
        }

        // 显示结果
        function showResult(won, choice, finalChoice) {
            const resultTitle = won ? '恭喜你赢了！' : '很遗憾，你输了！';
            const choiceText = choice === 'stay' ? '坚持原选择' : '换门';
            const resultText = `你选择了${choiceText}，最终选择门 ${finalChoice + 1}。${won ? '汽车就在这扇门后面！' : '汽车在门 ' + (gameState.carPosition + 1) + ' 后面。'}`;

            updateGameStatus(resultTitle + ' ' + resultText);
        }

        // 更新游戏状态显示
        function updateGameStatus(message) {
            document.getElementById('game-status').textContent = message;
        }

        // 更新统计显示
        function updateStatistics() {
            document.getElementById('total-games').textContent = gameState.totalGames;
            document.getElementById('stay-wins').textContent = gameState.stayWins;
            document.getElementById('switch-wins').textContent = gameState.switchWins;

            if (gameState.totalGames > 0) {
                const stayPercentage = ((gameState.stayWins / gameState.totalGames) * 100).toFixed(1);
                const switchPercentage = ((gameState.switchWins / gameState.totalGames) * 100).toFixed(1);
                document.getElementById('stay-percentage').textContent = stayPercentage + '%';
                document.getElementById('switch-percentage').textContent = switchPercentage + '%';
            } else {
                document.getElementById('stay-percentage').textContent = '0%';
                document.getElementById('switch-percentage').textContent = '0%';
            }
        }

        // 保存统计数据
        function saveStatistics() {
            localStorage.setItem('montyHallStats', JSON.stringify({
                totalGames: gameState.totalGames,
                stayWins: gameState.stayWins,
                switchWins: gameState.switchWins
            }));
        }

        // 加载统计数据
        function loadStatistics() {
            const saved = localStorage.getItem('montyHallStats');
            if (saved) {
                const stats = JSON.parse(saved);
                gameState.totalGames = stats.totalGames || 0;
                gameState.stayWins = stats.stayWins || 0;
                gameState.switchWins = stats.switchWins || 0;
                updateStatistics();
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', function() {
            console.log('DOM加载完成，开始初始化页面...');
            
            setTimeout(() => {
                initializePage();
                
                // 初始化MathJax渲染
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch(err => console.warn('MathJax渲染错误:', err));
                }
                
                console.log('蒙提霍尔问题动画演示虚拟实验室加载完成');
            }, 500);
        });
    </script>
</body>
</html>
