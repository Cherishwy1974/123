<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡方分布动画演示 - 高等应用数学虚拟实验室</title>
    
    <!-- 思源宋体字体 -->
    <link rel="stylesheet" href="../common-assets/fonts/source-han-serif.css">
    
    <!-- 本地化MathJax配置 -->
    <script src="../common-assets/js/mathjax-config.js"></script>
    <script async src="../common-assets/js/tex-svg.js"></script>
    
    <!-- 加载数学计算库 -->
    <script src="../common-assets/js/math.min.js"></script>
    
    <!-- 加载D3.js用于可视化 -->
    <script src="../common-assets/js/d3.v7.min.js"></script>

    <style>
        /* 字体标准化规范 */
        :root {
            --h1-size: 24px;
            --h2-size: 20px;
            --h3-size: 18px;
            --btn-size: 16px;
            --formula-size: 16px;
            --text-size: 16px;

            /* 现代化配色方案 */
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #3730a3;
            --secondary: #7c3aed;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --border: #e5e7eb;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Han Serif CN', 'Noto Serif CJK SC', '思源宋体', serif;
            font-size: var(--text-size);
            line-height: 1.6;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: var(--gray-800);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
            background: var(--light);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--light);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: none;
            position: relative;
            z-index: 10;
            min-height: 50px;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            letter-spacing: 0.5px;
        }

        .header-subtitle {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 400;
            margin: 0;
            margin-left: 16px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 180px 1fr;
            min-height: calc(100vh - 80px);
            overflow: auto;
        }

        .sidebar {
            background: var(--gray-50);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            overflow-y: auto;
        }

        .nav-tabs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px;
        }

        .nav-tab {
            padding: 14px 16px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: var(--btn-size);
            font-weight: 500;
            color: var(--gray-600);
            text-align: left;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: inherit;
            min-height: 44px;
        }

        .nav-tab::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: var(--primary);
            border-radius: 0 2px 2px 0;
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-tab:hover {
            background: var(--gray-100);
            color: var(--primary);
            transform: translateX(4px);
        }

        .nav-tab:hover::before {
            height: 24px;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--light);
            font-weight: 600;
            box-shadow: var(--shadow);
        }

        .nav-tab.active::before {
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .content-area {
            display: flex;
            overflow: auto;
            background: var(--light);
        }

        .panel {
            display: none;
            padding: 24px;
            overflow-y: auto;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) var(--gray-200);
            animation: fadeIn 0.3s ease-in-out;
        }

        .panel::-webkit-scrollbar {
            width: 6px;
        }

        .panel::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: 3px;
        }

        .panel::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .panel::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        .panel.active {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 左右分布布局 */
        .interactive-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            height: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .control-panel {
            background: var(--light);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-panel:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .result-container {
            background: var(--light);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-container:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 8px;
            font-size: var(--text-size);
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: var(--text-size);
            font-family: inherit;
            transition: all 0.3s ease;
            background: var(--light);
            min-height: 44px;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--light);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: var(--btn-size);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            margin: 8px;
            min-height: 44px;
            font-family: inherit;
        }

        .btn:hover {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #059669 0%, var(--success) 100%);
        }

        .formula-display {
            background: linear-gradient(135deg, #f0f7ff 0%, #e6f0ff 100%);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--primary);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.3s ease;
            margin: 16px 0;
            min-height: 60px;
            align-items: center;
            justify-content: center;
        }

        .formula-display:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }

        .parameter-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e9ecef;
        }

        .panel-title {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .parameter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .parameter-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .parameter-label {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
        }

        .parameter-input {
            padding: 10px 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .parameter-input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .parameter-slider {
            width:100vw;
            height: 8px;
            border-radius: 4px;
            background: #e9ecef;
            outline: none;
            transition: all 0.3s ease;
        }

        .parameter-slider::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .parameter-slider::-webkit-slider-thumb:hover {
            background: #5a6fd8;
            transform: scale(1.1);
        }

        .demo-area {
            background: linear-gradient(135deg, #f8fbff 0%, #e8f2ff 100%);
            padding: 30px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            text-align: center;
            min-height: 600px;
            position: relative;
        }

        .demo-title {
            font-size: 22px;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .distribution-chart {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            margin: 20px 0;
            height: 400px;
            position: relative;
        }

        .chart-canvas {
            width:100vw;
            height: 350px;
            border: 1px solid #e9ecef;
            border-radius: 4px;
        }

        .statistics-display {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            margin: 20px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .formula-display {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            margin: 20px 0;
            text-align: center;
        }

        .formula-title {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }

        .formula-content {
            font-size: 20px;
            color: #333;
            padding: 15px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 8px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .control-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .control-btn.simulate {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .control-btn.reset {
            background: linear-gradient(135deg, #dc3545 0%, #e83e8c 100%);
        }

        .MathJax, .MathJax_Display, mjx-container, mjx-math {
            font-size: 18px !important;
            font-weight: normal !important;
        }

        /* 数学公式样式 */
        .MathJax, .MathJax_Display, mjx-container, mjx-math {
            font-size: var(--formula-size) !important;
            font-weight: normal !important;
        }

        /* 行内公式样式 */
        .inline-math {
            display: inline;
            font-size: inherit;
        }

        .highlight {
            background: linear-gradient(120deg, #a8edea 0%, #fed6e3 100%);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 160px 1fr;
            }

            .interactive-layout {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr;
            }
            
            .sidebar {
                padding: 10px 0;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            
            .nav-tabs {
                flex-direction: row;
                overflow-x: auto;
                padding: 0 10px;
                gap: 4px;
            }
            
            .nav-tab {
                min-width: 100px;
                padding: 8px 12px;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .nav-tab::before {
                display: none;
            }

            .header-subtitle {
                display: none;
            }
            
            .parameter-group {
                grid-template-columns: 1fr;
            }
            
            .statistics-display {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
        }

        @media (max-width: 480px) {
            .panel {
                padding: 16px;
            }

            .control-panel {
                padding: 16px;
            }
        }
    
        /* 美化滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-600);
        }

        ::-webkit-scrollbar-corner {
            background: var(--gray-100);
        }

        /* Firefox 滚动条样式 */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--gray-300) var(--gray-100);
        }</style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <h1>卡方分布动画演示</h1>
                <p class="header-subtitle">理解卡方分布的形状和自由度的影响</p>
            </div>
        </header>

        <main class="main-content">
            <nav class="sidebar">
                <div class="nav-tabs">
                    <button class="nav-tab active" data-panel="calculator">
                        <span class="nav-icon">🧮</span>
                        <span>计算器</span>
                    </button>
                    <button class="nav-tab" data-panel="visualization">
                        <span class="nav-icon">📊</span>
                        <span>可视化</span>
                    </button>
                    <button class="nav-tab" data-panel="theory">
                        <span class="nav-icon">📚</span>
                        <span>理论基础</span>
                    </button>
                    <button class="nav-tab" data-panel="practice">
                        <span class="nav-icon">📝</span>
                        <span>练习</span>
                    </button>
                </div>
            </nav>

            <div class="content-area">
                <!-- 计算器面板 -->
                <div class="panel active" id="calculator">
                    <div class="interactive-layout">
                        <div class="control-panel">
                            <h3 style="font-size: var(--h3-size); color: var(--primary); margin-bottom: 16px; font-weight: 700;">卡方分布计算器</h3>

                            <div class="input-group">
                                <label for="chiSquareK">自由度 k:</label>
                                <input type="number" id="chiSquareK" placeholder="例如: 5" min="1" max="50" onchange="calculateChiSquare()">
                            </div>

                            <div class="input-group">
                                <label for="chiSquareX">x 值:</label>
                                <input type="number" id="chiSquareX" placeholder="例如: 10" min="0" step="0.1" onchange="calculateChiSquare()">
                            </div>

                            <div style="text-align: center;">
                                <button class="btn" onclick="calculateChiSquare()">计算</button>
                                <button class="btn btn-secondary" onclick="clearChiSquareInputs()">清空</button>
                            </div>
                        </div>

                        <div class="result-container">
                            <h3 style="color: var(--primary); margin-bottom: 16px;">计算结果</h3>
                            <div class="formula-display" id="chiSquareResult">
                                输入参数并点击计算
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 可视化面板 -->
                <div class="panel" id="visualization">
            <!-- 参数控制面板 -->
            <div class="parameter-panel">
                <div class="panel-title">卡方分布参数设置</div>
                <div class="parameter-group">
                    <div class="parameter-item">
                        <label class="parameter-label">自由度 k</label>
                        <input type="range" class="parameter-slider" id="k-slider" min="1" max="20" step="1" value="5">
                        <input type="number" class="parameter-input" id="k-input" value="5" min="1" max="20" step="1">
                    </div>
                </div>
                <div class="controls">
                    <button class="control-btn simulate" id="sample-btn">生成样本</button>
                    <button class="control-btn reset" id="reset-btn">重置</button>
                </div>
            </div>
            
            <!-- 演示区域 -->
            <div class="demo-area">
                <div class="demo-title">卡方分布可视化</div>
                
                <!-- 公式显示 -->
                <div class="formula-display">
                    <div class="formula-title">卡方分布概率密度函数</div>
                    <div class="formula-content">
                        $$f(x) = \frac{1}{2^{k/2}\Gamma(k/2)} x^{k/2-1} e^{-x/2}$$
                        <br>
                        其中 $k$ 为自由度，$x \geq 0$
                    </div>
                </div>
                
                <!-- 分布图表 -->
                <div class="distribution-chart">
                    <canvas class="chart-canvas" id="chart-canvas"></canvas>
                </div>
                
                <!-- 统计信息 -->
                <div class="statistics-display" id="statistics-display">
                    <div class="stat-item">
                        <div class="stat-label">自由度 k</div>
                        <div class="stat-value" id="k-value">5</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">期望值 E(X)</div>
                        <div class="stat-value" id="expected-value">5</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">方差 Var(X)</div>
                        <div class="stat-value" id="variance-value">10</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">标准差 σ</div>
                        <div class="stat-value" id="std-value">3.162</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">样本数量</div>
                        <div class="stat-value" id="sample-count">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let canvas, ctx;
        let k = 5;
        let samples = [];

        // MathJax渲染辅助函数
        function renderMathJax(element) {
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([element]).catch(err => {
                    console.warn('MathJax渲染错误:', err);
                    setTimeout(() => {
                        if (window.MathJax && window.MathJax.typesetPromise) {
                            window.MathJax.typesetPromise([element]).catch(e => console.warn('MathJax延迟渲染也失败:', e));
                        }
                    }, 100);
                });
            } else {
                setTimeout(() => renderMathJax(element), 200);
            }
        }

        // 导航标签页切换
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

                tab.classList.add('active');
                const panelId = tab.getAttribute('data-panel');
                const panel = document.getElementById(panelId);
                if (panel) {
                    panel.classList.add('active');
                }

                setTimeout(() => {
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetPromise([panel]).catch(err => console.log('MathJax渲染错误:', err));
                    }
                }, 100);
            });
        });

        // 卡方分布计算功能
        function calculateChiSquare() {
            const k = parseFloat(document.getElementById('chiSquareK').value);
            const x = parseFloat(document.getElementById('chiSquareX').value);
            const resultDiv = document.getElementById('chiSquareResult');

            if (isNaN(k) || isNaN(x)) {
                resultDiv.innerHTML = '请输入有效的参数值';
                return;
            }

            if (k <= 0) {
                resultDiv.innerHTML = '自由度k必须大于0';
                return;
            }

            if (x < 0) {
                resultDiv.innerHTML = 'x值必须大于等于0';
                return;
            }

            // 计算卡方分布的概率密度函数值
            const pdf = chiSquarePDF(x, k);
            const expectedValue = k;
            const variance = 2 * k;
            const stdDev = Math.sqrt(variance);

            let result = `卡方分布计算结果：<br>`;
            result += `概率密度函数值：f(${x}) = ${pdf.toFixed(6)}<br>`;
            result += `期望值：E(X) = ${expectedValue}<br>`;
            result += `方差：Var(X) = ${variance}<br>`;
            result += `标准差：σ = ${stdDev.toFixed(3)}<br>`;
            result += `概率密度函数：$f(x) = \\frac{1}{2^{${k}/2}\\Gamma(${k}/2)} x^{${k}/2-1} e^{-x/2}$`;

            resultDiv.innerHTML = result;
            renderMathJax(resultDiv);
        }

        function clearChiSquareInputs() {
            document.getElementById('chiSquareK').value = '';
            document.getElementById('chiSquareX').value = '';
            document.getElementById('chiSquareResult').innerHTML = '输入参数并点击计算';
        }

        // 初始化页面
        function initializePage() {
            canvas = document.getElementById('chart-canvas');
            ctx = canvas.getContext('2d');
            setupEventListeners();
            resizeCanvas();
            updateStatistics();
            drawDistribution();
        }

        // 设置事件监听器
        function setupEventListeners() {
            document.getElementById('k-slider').addEventListener('input', updateFromSlider);
            document.getElementById('k-input').addEventListener('input', updateFromInput);
            document.getElementById('sample-btn').addEventListener('click', generateSamples);
            document.getElementById('reset-btn').addEventListener('click', resetSamples);
            
            window.addEventListener('resize', resizeCanvas);
        }

        // 从滑块更新
        function updateFromSlider(e) {
            const inputElement = document.getElementById('k-input');
            inputElement.value = e.target.value;
            k = parseInt(e.target.value);
            updateStatistics();
            drawDistribution();
        }

        // 从输入框更新
        function updateFromInput(e) {
            const sliderElement = document.getElementById('k-slider');
            sliderElement.value = e.target.value;
            k = parseInt(e.target.value);
            updateStatistics();
            drawDistribution();
        }

        // 调整画布大小
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        // 更新统计信息
        function updateStatistics() {
            const expectedValue = k;
            const variance = 2 * k;
            const stdDev = Math.sqrt(variance);
            
            document.getElementById('k-value').textContent = k;
            document.getElementById('expected-value').textContent = expectedValue;
            document.getElementById('variance-value').textContent = variance;
            document.getElementById('std-value').textContent = stdDev.toFixed(3);
            document.getElementById('sample-count').textContent = samples.length;
        }

        // 伽马函数近似
        function gamma(z) {
            if (z === 1) return 1;
            if (z === 0.5) return Math.sqrt(Math.PI);
            if (z > 1) return (z - 1) * gamma(z - 1);
            return Math.sqrt(Math.PI) / Math.sqrt(z);
        }

        // 卡方分布概率密度函数
        function chiSquarePDF(x, k) {
            if (x <= 0) return 0;
            const coefficient = 1 / (Math.pow(2, k/2) * gamma(k/2));
            return coefficient * Math.pow(x, k/2 - 1) * Math.exp(-x/2);
        }

        // 生成卡方分布随机数
        function generateChiSquare(k) {
            let sum = 0;
            for (let i = 0; i < k; i++) {
                const normal = generateNormal(0, 1);
                sum += normal * normal;
            }
            return sum;
        }

        // 生成标准正态分布随机数
        function generateNormal(mu, sigma) {
            let u = 0, v = 0;
            while(u === 0) u = Math.random();
            while(v === 0) v = Math.random();
            
            const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            return z * sigma + mu;
        }

        // 绘制分布图
        function drawDistribution() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            const margin = 40;
            
            // 绘制坐标轴
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin, height - margin);
            ctx.lineTo(width - margin, height - margin);
            ctx.moveTo(margin, margin);
            ctx.lineTo(margin, height - margin);
            ctx.stroke();
            
            const maxX = Math.max(20, k + 3 * Math.sqrt(2 * k));
            
            // 绘制卡方分布曲线
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.beginPath();
            
            let maxY = 0;
            for (let i = 0; i <= width - 2 * margin; i++) {
                const x = (i / (width - 2 * margin)) * maxX;
                const y = chiSquarePDF(x, k);
                maxY = Math.max(maxY, y);
            }
            
            for (let i = 0; i <= width - 2 * margin; i++) {
                const x = (i / (width - 2 * margin)) * maxX;
                const y = chiSquarePDF(x, k);
                const canvasX = margin + i;
                const canvasY = height - margin - (y / maxY) * (height - 2 * margin - 20);
                
                if (i === 0) {
                    ctx.moveTo(canvasX, canvasY);
                } else {
                    ctx.lineTo(canvasX, canvasY);
                }
            }
            ctx.stroke();
            
            // 绘制样本点
            if (samples.length > 0) {
                ctx.fillStyle = '#dc3545';
                samples.forEach(sample => {
                    const x = margin + (sample / maxX) * (width - 2 * margin);
                    const y = height - margin - 10;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, 2 * Math.PI);
                    ctx.fill();
                });
            }
            
            // 添加标题和标签
            ctx.fillStyle = '#333';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('卡方分布概率密度函数', width / 2, margin - 10);
            
            ctx.font = '12px Arial';
            ctx.fillText('x', width / 2, height - 5);
            
            ctx.save();
            ctx.translate(15, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('概率密度 f(x)', 0, 0);
            ctx.restore();
        }

        // 生成样本
        function generateSamples() {
            for (let i = 0; i < 50; i++) {
                samples.push(generateChiSquare(k));
            }
            updateStatistics();
            drawDistribution();
        }

        // 重置样本
        function resetSamples() {
            samples = [];
            updateStatistics();
            drawDistribution();
        }

        // 事件监听
        document.addEventListener('DOMContentLoaded', () => {
            initializePage();

            // MathJax 初始化
            setTimeout(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch(err => console.log('MathJax error:', err));
                }
            }, 300);
        });
    </script>
</body>
</html>
