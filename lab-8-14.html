<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>假设检验动画演示 - 高等应用数学虚拟实验室</title>
    
    <!-- 思源宋体字体 -->
    <link rel="stylesheet" href="../common-assets/fonts/source-han-serif.css">
    
    <!-- 本地化MathJax配置 -->
    <script src="../common-assets/js/mathjax-config.js"></script>
    <script async src="../common-assets/js/tex-svg.js"></script>
    
    <!-- 加载数学计算库 -->
    <script src="../common-assets/js/math.min.js"></script>
    
    <!-- 加载D3.js用于可视化 -->
    <script src="../common-assets/js/d3.v7.min.js"></script>

<style>
        /* 字体标准化规范 */
        :root {
            --h1-size: 24px;
            --h2-size: 20px;
            --h3-size: 18px;
            --btn-size: 16px;
            --formula-size: 16px;
            --text-size: 16px;

            /* 现代化配色方案 */
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #3730a3;
            --secondary: #7c3aed;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --border: #e5e7eb;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Han Serif CN', 'Noto Serif CJK SC', '思源宋体', serif;
            font-size: var(--text-size);
            line-height: 1.6;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: var(--gray-800);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
            background: var(--light);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--light);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: none;
            position: relative;
            z-index: 10;
            min-height: 50px;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            letter-spacing: 0.5px;
        }

        .header-subtitle {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 400;
            margin: 0;
            margin-left: 16px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 180px 1fr;
            min-height: calc(100vh - 80px);
            overflow: auto;
        }

        .sidebar {
            background: var(--gray-50);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            overflow-y: auto;
        }

        .nav-tabs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 16px;
        }

        .nav-tab {
            padding: 14px 16px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: var(--btn-size);
            font-weight: 500;
            color: var(--gray-600);
            text-align: left;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: inherit;
            min-height: 44px;
        }

        .nav-tab::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: var(--primary);
            border-radius: 0 2px 2px 0;
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-tab:hover {
            background: var(--gray-100);
            color: var(--primary);
            transform: translateX(4px);
        }

        .nav-tab:hover::before {
            height: 24px;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--light);
            font-weight: 600;
            box-shadow: var(--shadow);
        }

        .nav-tab.active::before {
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .content-area {
            display: flex;
            overflow: auto;
            background: var(--light);
        }

        .panel {
            display: none;
            padding: 24px;
            overflow-y: auto;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) var(--gray-200);
            animation: fadeIn 0.3s ease-in-out;
        }

        .panel::-webkit-scrollbar {
            width: 6px;
        }

        .panel::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: 3px;
        }

        .panel::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .panel::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        .panel.active {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 左右分布布局 */
        .interactive-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            height: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .control-panel {
            background: var(--light);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-panel:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .result-container {
            background: var(--light);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-container:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 8px;
            font-size: var(--text-size);
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: var(--text-size);
            font-family: inherit;
            transition: all 0.3s ease;
            background: var(--light);
            min-height: 44px;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--light);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: var(--btn-size);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            margin: 8px;
            min-height: 44px;
            font-family: inherit;
        }

        .btn:hover {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #059669 0%, var(--success) 100%);
        }

        .formula-display {
            background: linear-gradient(135deg, #f0f7ff 0%, #e6f0ff 100%);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--primary);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.3s ease;
            margin: 16px 0;
            min-height: 60px;
            align-items: center;
            justify-content: center;
        }

        .formula-display:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }

        .hypothesis-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e9ecef;
        }

        .panel-title {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .hypothesis-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .hypothesis-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
        }

        .hypothesis-label {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .hypothesis-input {
            width:100vw;
            padding: 8px 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
        }

        .hypothesis-input:focus {
            border-color: #667eea;
            outline: none;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .control-btn.test {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .control-btn.reset {
            background: linear-gradient(135deg, #dc3545 0%, #e83e8c 100%);
        }

        .demo-area {
            background: linear-gradient(135deg, #f8fbff 0%, #e8f2ff 100%);
            padding: 30px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            text-align: center;
            min-height: 600px;
            position: relative;
        }

        .demo-title {
            font-size: 22px;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .distribution-display {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            margin: 20px 0;
            height: 400px;
            position: relative;
        }

        .dist-canvas {
            width:100vw;
            height: 350px;
            border: 1px solid #e9ecef;
            border-radius: 4px;
        }

        .test-results {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            margin: 20px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .result-item {
            text-align: center;
            padding: 15px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
        }

        .result-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .result-value.reject {
            color: #dc3545;
        }

        .result-value.accept {
            color: #28a745;
        }

        .steps-explanation {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            margin: 20px 0;
            text-align: left;
        }

        .step-item {
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .step-item:last-child {
            border-bottom: none;
        }

        .step-number {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            margin-right: 10px;
        }

        .step-text {
            display: inline-block;
            vertical-align: top;
            width: calc(100% - 50px);
            font-size: 16px;
            color: #333;
        }

        .critical-region {
            position: absolute;
            background: rgba(220, 53, 69, 0.3);
            border: 2px solid #dc3545;
            border-radius: 4px;
        }

        .test-statistic-line {
            position: absolute;
            background: #28a745;
            width: 3px;
            border-radius: 2px;
        }

        .MathJax, .MathJax_Display, mjx-container, mjx-math {
            font-size: 18px !important;
            font-weight: normal !important;
        }

        /* 数学公式样式 */
        .MathJax, .MathJax_Display, mjx-container, mjx-math {
            font-size: var(--formula-size) !important;
            font-weight: normal !important;
        }

        /* 行内公式样式 */
        .inline-math {
            display: inline;
            font-size: inherit;
        }

        .highlight {
            background: linear-gradient(120deg, #a8edea 0%, #fed6e3 100%);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 160px 1fr;
            }

            .interactive-layout {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr;
            }
            
            .sidebar {
                padding: 10px 0;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            
            .nav-tabs {
                flex-direction: row;
                overflow-x: auto;
                padding: 0 10px;
                gap: 4px;
            }
            
            .nav-tab {
                min-width: 100px;
                padding: 8px 12px;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .nav-tab::before {
                display: none;
            }

            .header-subtitle {
                display: none;
            }
            
            .hypothesis-group {
                grid-template-columns: 1fr;
            }
            
            .control-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .test-results {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .panel {
                padding: 16px;
            }

            .control-panel {
                padding: 16px;
            }
        }
    
        /* 美化滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-600);
        }

        ::-webkit-scrollbar-corner {
            background: var(--gray-100);
        }

        /* Firefox 滚动条样式 */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--gray-300) var(--gray-100);
        }</style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <h1>假设检验动画演示</h1>
                <p class="header-subtitle">可视化理解假设检验的原理和过程</p>
            </div>
        </header>

        <main class="main-content">
            <nav class="sidebar">
                <div class="nav-tabs">
                    <button class="nav-tab active" data-panel="calculator">
                        <span class="nav-icon">🧮</span>
                        <span>计算器</span>
                    </button>
                    <button class="nav-tab" data-panel="visualization">
                        <span class="nav-icon">📊</span>
                        <span>可视化</span>
                    </button>
                    <button class="nav-tab" data-panel="theory">
                        <span class="nav-icon">📚</span>
                        <span>理论基础</span>
                    </button>
                    <button class="nav-tab" data-panel="practice">
                        <span class="nav-icon">📝</span>
                        <span>练习</span>
                    </button>
                </div>
            </nav>

            <div class="content-area">
                <!-- 计算器面板 -->
                <div class="panel active" id="calculator">
                    <div class="interactive-layout">
                        <div class="control-panel">
                            <h3 style="font-size: var(--h3-size); color: var(--primary); margin-bottom: 16px; font-weight: 700;">假设检验计算器</h3>

                            <div class="input-group">
                                <label for="hypTestMean">样本均值 x̄:</label>
                                <input type="number" id="hypTestMean" placeholder="例如: 105" step="0.1" onchange="calculateHypothesisTest()">
                            </div>

                            <div class="input-group">
                                <label for="hypTestStd">总体标准差 σ:</label>
                                <input type="number" id="hypTestStd" placeholder="例如: 15" step="0.1" min="0.1" onchange="calculateHypothesisTest()">
                            </div>

                            <div class="input-group">
                                <label for="hypTestSize">样本大小 n:</label>
                                <input type="number" id="hypTestSize" placeholder="例如: 25" min="1" max="1000" onchange="calculateHypothesisTest()">
                            </div>

                            <div class="input-group">
                                <label for="hypTestNull">原假设 μ₀:</label>
                                <input type="number" id="hypTestNull" placeholder="例如: 100" step="0.1" onchange="calculateHypothesisTest()">
                            </div>

                            <div style="text-align: center;">
                                <button class="btn" onclick="calculateHypothesisTest()">计算</button>
                                <button class="btn btn-secondary" onclick="clearHypTestInputs()">清空</button>
                            </div>
                        </div>

                        <div class="result-container">
                            <h3 style="color: var(--primary); margin-bottom: 16px;">计算结果</h3>
                            <div class="formula-display" id="hypTestResult">
                                输入参数并点击计算
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 可视化面板 -->
                <div class="panel" id="visualization">
            <!-- 假设设置面板 -->
            <div class="hypothesis-panel">
                <div class="panel-title">假设检验设置</div>
                <div class="hypothesis-group">
                    <div class="hypothesis-item">
                        <div class="hypothesis-label">原假设 H₀: μ =</div>
                        <input type="number" class="hypothesis-input" id="null-mean" value="100" step="0.1">
                    </div>
                    <div class="hypothesis-item">
                        <div class="hypothesis-label">总体标准差 σ</div>
                        <input type="number" class="hypothesis-input" id="population-std" value="15" step="0.1" min="0.1">
                    </div>
                    <div class="hypothesis-item">
                        <div class="hypothesis-label">样本大小 n</div>
                        <input type="number" class="hypothesis-input" id="sample-size" value="25" min="1" max="1000">
                    </div>
                    <div class="hypothesis-item">
                        <div class="hypothesis-label">样本均值 x̄</div>
                        <input type="number" class="hypothesis-input" id="sample-mean" value="105" step="0.1">
                    </div>
                    <div class="hypothesis-item">
                        <div class="hypothesis-label">显著性水平 α</div>
                        <select class="hypothesis-input" id="alpha-level">
                            <option value="0.01">0.01</option>
                            <option value="0.05" selected>0.05</option>
                            <option value="0.10">0.10</option>
                        </select>
                    </div>
                    <div class="hypothesis-item">
                        <div class="hypothesis-label">检验类型</div>
                        <select class="hypothesis-input" id="test-type">
                            <option value="two-tailed">双尾检验</option>
                            <option value="left-tailed">左尾检验</option>
                            <option value="right-tailed">右尾检验</option>
                        </select>
                    </div>
                </div>
                <div class="control-buttons">
                    <button class="control-btn test" id="test-btn">执行检验</button>
                    <button class="control-btn reset" id="reset-btn">重置</button>
                </div>
            </div>
            
            <!-- 演示区域 -->
            <div class="demo-area">
                <div class="demo-title">假设检验可视化</div>
                
                <!-- 分布图 -->
                <div class="distribution-display">
                    <canvas class="dist-canvas" id="distribution-canvas"></canvas>
                </div>
                
                <!-- 检验结果 -->
                <div class="test-results" id="test-results">
                    <div class="result-item">
                        <div class="result-label">检验统计量 Z</div>
                        <div class="result-value" id="test-statistic">-</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">临界值</div>
                        <div class="result-value" id="critical-value">-</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">P值</div>
                        <div class="result-value" id="p-value">-</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">检验结论</div>
                        <div class="result-value" id="conclusion">-</div>
                    </div>
                </div>
                
                <!-- 步骤说明 -->
                <div class="steps-explanation" id="steps-explanation">
                    <div class="step-item">
                        <span class="step-number">1</span>
                        <span class="step-text">设定原假设H₀和备择假设H₁</span>
                    </div>
                    <div class="step-item">
                        <span class="step-number">2</span>
                        <span class="step-text">选择显著性水平α</span>
                    </div>
                    <div class="step-item">
                        <span class="step-number">3</span>
                        <span class="step-text">计算检验统计量</span>
                    </div>
                    <div class="step-item">
                        <span class="step-number">4</span>
                        <span class="step-text">确定临界区域</span>
                    </div>
                    <div class="step-item">
                        <span class="step-number">5</span>
                        <span class="step-text">做出统计决策</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let canvas, ctx;

        // MathJax渲染辅助函数
        function renderMathJax(element) {
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([element]).catch(err => {
                    console.warn('MathJax渲染错误:', err);
                    setTimeout(() => {
                        if (window.MathJax && window.MathJax.typesetPromise) {
                            window.MathJax.typesetPromise([element]).catch(e => console.warn('MathJax延迟渲染也失败:', e));
                        }
                    }, 100);
                });
            } else {
                setTimeout(() => renderMathJax(element), 200);
            }
        }

        // 导航标签页切换
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

                tab.classList.add('active');
                const panelId = tab.getAttribute('data-panel');
                const panel = document.getElementById(panelId);
                if (panel) {
                    panel.classList.add('active');
                }

                setTimeout(() => {
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetPromise([panel]).catch(err => console.log('MathJax渲染错误:', err));
                    }
                }, 100);
            });
        });

        // 假设检验计算功能
        function calculateHypothesisTest() {
            const sampleMean = parseFloat(document.getElementById('hypTestMean').value);
            const populationStd = parseFloat(document.getElementById('hypTestStd').value);
            const sampleSize = parseInt(document.getElementById('hypTestSize').value);
            const nullMean = parseFloat(document.getElementById('hypTestNull').value);
            const resultDiv = document.getElementById('hypTestResult');

            if (isNaN(sampleMean) || isNaN(populationStd) || isNaN(sampleSize) || isNaN(nullMean)) {
                resultDiv.innerHTML = '请输入有效的参数值';
                return;
            }

            if (populationStd <= 0) {
                resultDiv.innerHTML = '总体标准差必须大于0';
                return;
            }

            if (sampleSize <= 0) {
                resultDiv.innerHTML = '样本大小必须大于0';
                return;
            }

            // 计算检验统计量
            const standardError = populationStd / Math.sqrt(sampleSize);
            const zStatistic = (sampleMean - nullMean) / standardError;

            // 计算P值（双尾检验）
            const pValue = 2 * (1 - normalCDF(Math.abs(zStatistic)));

            let result = `假设检验计算结果：<br>`;
            result += `检验统计量：Z = ${zStatistic.toFixed(3)}<br>`;
            result += `标准误差：SE = ${standardError.toFixed(3)}<br>`;
            result += `P值（双尾）：P = ${pValue.toFixed(4)}<br>`;
            result += `显著性水平：α = 0.05<br>`;
            result += `结论：${pValue < 0.05 ? '拒绝H₀' : '接受H₀'}<br>`;
            result += `公式：$Z = \\frac{\\bar{x} - \\mu_0}{\\sigma/\\sqrt{n}} = \\frac{${sampleMean} - ${nullMean}}{${populationStd}/\\sqrt{${sampleSize}}} = ${zStatistic.toFixed(3)}$`;

            resultDiv.innerHTML = result;
            renderMathJax(resultDiv);
        }

        function clearHypTestInputs() {
            document.getElementById('hypTestMean').value = '';
            document.getElementById('hypTestStd').value = '';
            document.getElementById('hypTestSize').value = '';
            document.getElementById('hypTestNull').value = '';
            document.getElementById('hypTestResult').innerHTML = '输入参数并点击计算';
        }

        // 初始化页面
        function initializePage() {
            canvas = document.getElementById('distribution-canvas');
            ctx = canvas.getContext('2d');
            setupEventListeners();
            resizeCanvas();
            drawInitialDistribution();
        }

        // 设置事件监听器
        function setupEventListeners() {
            document.getElementById('test-btn').addEventListener('click', performHypothesisTest);
            document.getElementById('reset-btn').addEventListener('click', resetTest);

            // 参数变化时重新绘制
            ['null-mean', 'population-std', 'sample-size', 'sample-mean', 'alpha-level', 'test-type'].forEach(id => {
                document.getElementById(id).addEventListener('change', drawInitialDistribution);
            });

            window.addEventListener('resize', resizeCanvas);
        }

        // 调整画布大小
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        // 绘制初始分布
        function drawInitialDistribution() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            const margin = 40;

            // 获取参数
            const nullMean = parseFloat(document.getElementById('null-mean').value);
            const populationStd = parseFloat(document.getElementById('population-std').value);
            const sampleSize = parseInt(document.getElementById('sample-size').value);

            // 计算标准误差
            const standardError = populationStd / Math.sqrt(sampleSize);

            // 绘制坐标轴
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin, height - margin);
            ctx.lineTo(width - margin, height - margin);
            ctx.moveTo(margin, margin);
            ctx.lineTo(margin, height - margin);
            ctx.stroke();

            // 绘制正态分布曲线
            drawNormalCurve(width, height, margin, nullMean, standardError);

            // 添加标签
            ctx.fillStyle = '#333';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('样本均值分布 (H₀为真时)', width / 2, margin - 10);
        }

        // 绘制正态分布曲线
        function drawNormalCurve(width, height, margin, mean, std) {
            const xMin = mean - 4 * std;
            const xMax = mean + 4 * std;
            const xRange = xMax - xMin;

            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.beginPath();

            for (let i = 0; i <= width - 2 * margin; i++) {
                const x = xMin + (i / (width - 2 * margin)) * xRange;
                const y = normalPDF(x, mean, std);
                const canvasX = margin + i;
                const canvasY = height - margin - (y * (height - 2 * margin) * std * Math.sqrt(2 * Math.PI) * 0.8);

                if (i === 0) {
                    ctx.moveTo(canvasX, canvasY);
                } else {
                    ctx.lineTo(canvasX, canvasY);
                }
            }
            ctx.stroke();
        }

        // 正态分布概率密度函数
        function normalPDF(x, mean, std) {
            return (1 / (std * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mean) / std, 2));
        }

        // 标准正态分布累积分布函数（近似）
        function normalCDF(z) {
            return 0.5 * (1 + erf(z / Math.sqrt(2)));
        }

        // 误差函数近似
        function erf(x) {
            const a1 =  0.254829592;
            const a2 = -0.284496736;
            const a3 =  1.421413741;
            const a4 = -1.453152027;
            const a5 =  1.061405429;
            const p  =  0.3275911;

            const sign = x >= 0 ? 1 : -1;
            x = Math.abs(x);

            const t = 1.0 / (1.0 + p * x);
            const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);

            return sign * y;
        }

        // 执行假设检验
        function performHypothesisTest() {
            // 获取参数
            const nullMean = parseFloat(document.getElementById('null-mean').value);
            const populationStd = parseFloat(document.getElementById('population-std').value);
            const sampleSize = parseInt(document.getElementById('sample-size').value);
            const sampleMean = parseFloat(document.getElementById('sample-mean').value);
            const alpha = parseFloat(document.getElementById('alpha-level').value);
            const testType = document.getElementById('test-type').value;

            // 计算检验统计量
            const standardError = populationStd / Math.sqrt(sampleSize);
            const zStatistic = (sampleMean - nullMean) / standardError;

            // 计算临界值和P值
            let criticalValue, pValue, conclusion;

            switch(testType) {
                case 'two-tailed':
                    criticalValue = getZCritical(alpha / 2);
                    pValue = 2 * (1 - normalCDF(Math.abs(zStatistic)));
                    conclusion = Math.abs(zStatistic) > criticalValue ? '拒绝H₀' : '接受H₀';
                    break;
                case 'left-tailed':
                    criticalValue = -getZCritical(alpha);
                    pValue = normalCDF(zStatistic);
                    conclusion = zStatistic < criticalValue ? '拒绝H₀' : '接受H₀';
                    break;
                case 'right-tailed':
                    criticalValue = getZCritical(alpha);
                    pValue = 1 - normalCDF(zStatistic);
                    conclusion = zStatistic > criticalValue ? '拒绝H₀' : '接受H₀';
                    break;
            }

            // 更新结果显示
            updateResults(zStatistic, criticalValue, pValue, conclusion);

            // 重新绘制分布图，包含临界区域和检验统计量
            drawTestVisualization(nullMean, standardError, zStatistic, criticalValue, testType, alpha);
        }

        // 获取Z临界值（近似）
        function getZCritical(alpha) {
            // 常用临界值
            const criticalValues = {
                0.005: 2.576,
                0.01: 2.326,
                0.025: 1.96,
                0.05: 1.645,
                0.10: 1.282
            };
            return criticalValues[alpha] || 1.96;
        }

        // 更新结果显示
        function updateResults(zStatistic, criticalValue, pValue, conclusion) {
            document.getElementById('test-statistic').textContent = zStatistic.toFixed(3);
            document.getElementById('critical-value').textContent =
                Array.isArray(criticalValue) ?
                `±${Math.abs(criticalValue[0]).toFixed(3)}` :
                criticalValue.toFixed(3);
            document.getElementById('p-value').textContent = pValue.toFixed(4);

            const conclusionElement = document.getElementById('conclusion');
            conclusionElement.textContent = conclusion;
            conclusionElement.className = 'result-value ' + (conclusion.includes('拒绝') ? 'reject' : 'accept');
        }

        // 重置检验
        function resetTest() {
            document.getElementById('null-mean').value = '100';
            document.getElementById('population-std').value = '15';
            document.getElementById('sample-size').value = '25';
            document.getElementById('sample-mean').value = '105';
            document.getElementById('alpha-level').value = '0.05';
            document.getElementById('test-type').value = 'two-tailed';

            // 重置结果显示
            ['test-statistic', 'critical-value', 'p-value', 'conclusion'].forEach(id => {
                const element = document.getElementById(id);
                element.textContent = '-';
                element.className = 'result-value';
            });

            drawInitialDistribution();
        }

        // 事件监听
        document.addEventListener('DOMContentLoaded', () => {
            initializePage();

            // MathJax 初始化
            setTimeout(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch(err => console.log('MathJax error:', err));
                }
            }, 300);
        });
    </script>
</body>
</html>
