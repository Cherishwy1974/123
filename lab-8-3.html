<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 本地化MathJax配置 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                packages: {'[+]': ['ams', 'base']},
                macros: {
                    lim: ['\\mathop{\\rm lim}\\limits', 1],
                    liminf: ['\\mathop{\\rm lim\\,inf}\\limits', 1],
                    limsup: ['\\mathop{\\rm lim\\,sup}\\limits', 1]
                }
            },
            chtml: {
                scale: 1,
                minScale: 0.8,
                matchFontHeight: false,
                mtextInheritFont: true
            },
            startup: {
                ready: () => {
                    MathJax.startup.defaultReady();
                    console.log('MathJax加载完成');
                }
            }
        };
    </script>
    <script async src="../common-assets/js/tex-svg.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>频率与概率动画演示 - 高等应用数学虚拟实验室</title>
    
    <!-- 本地化资源 - 移除外部依赖 -->

    <!-- 隐藏滚动条样式 -->

<style>
        /* 页面特定样式补充 - 使用fullscreen-layout.css统一样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Source Han Serif SC", "Noto Serif CJK SC", "SimSun", serif;
            font-size: 16px;
            line-height: 1.6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            color: #333;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 全屏容器布局 */
        .app-container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
            background: #ffffff;
            overflow: hidden;
        }

        /* 顶部标题栏 */
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: #ffffff;
            padding: 12px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 50px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.025em;
        }

        .header-subtitle {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 400;
            margin: 0;
            margin-left: 16px;
        }

        .content {
            flex: 1;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto; /* 允许垂直滚动 */
        }

        .experiment-panel {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
            text-align: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .control-label {
            font-size: 14px;
            color: #666;
            min-width: 100px;
        }

        .control-input {
            padding: 6px 10px;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
            width: 100px;
        }

        .control-input:focus {
            border-color: #667eea;
            outline: none;
        }

        .control-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            min-height: 32px;
            min-width: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .control-btn.start {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .control-btn.stop {
            background: linear-gradient(135deg, #dc3545 0%, #e83e8c 100%);
        }

        .control-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .demo-area {
            background: linear-gradient(135deg, #f8fbff 0%, #e8f2ff 100%);
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            text-align: center;
            min-height: 300px;
            position: relative;
        }

        .demo-title {
            display: none;
        }

        .coin-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
        }

        .coin {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: 3px solid #f39c12;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #8b4513;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .coin:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }

        .coin.flipping {
            animation: flip 1s ease-in-out;
        }

        @keyframes flip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(360deg); }
        }

        .convergence-chart {
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
            margin: 10px 0;
            text-align: center;
        }

        #convergence-canvas {
            max-width:100vw;
            height: auto;
            border: 1px solid #e9ecef;
            border-radius: 4px;
        }

        .statistics-display {
            background: white;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
            margin: 10px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            padding: 8px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 6px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-frequency {
            font-size: 14px;
            color: #28a745;
            margin-top: 3px;
        }

        /* MathJax样式 */
        .MathJax, .MathJax_Display, mjx-container, mjx-math {
            font-size: 16px !important;
            font-weight: normal !important;
        }
        
        .MathJax_Display {
            font-size: 18px !important;
        }
        
        .formula-inline {
            display: inline;
        }
        
        .formula-inline .MathJax {
            font-size: 16px !important;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .header-subtitle {
                font-size: 14px;
            }
            
            .content {
                padding: 12px;
                flex-direction: column;
            }
            
            .experiment-panel {
                width: 100%;
            }
            
            .control-group {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .coin {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }
            
            .statistics-display {
                grid-template-columns: 1fr;
            }
        }
    
        /* 美化滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-600);
        }

        ::-webkit-scrollbar-corner {
            background: var(--gray-100);
        }

        /* Firefox 滚动条样式 */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--gray-300) var(--gray-100);
        }</style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-title">
                <h1>频率与概率动画演示</h1>
                <span class="header-subtitle">通过大量实验观察频率趋向理论概率的过程</span>
            </div>
        </div>

        <div class="content">
            <!-- 实验控制面板 -->
            <div class="experiment-panel">
                <div class="panel-title">硬币投掷实验</div>
                
                <div class="control-group">
                    <label class="control-label">实验次数:</label>
                    <input type="number" class="control-input" id="trial-count" value="100" min="10" max="10000">
                    <button class="control-btn start" id="start-btn">开始实验</button>
                    <button class="control-btn stop" id="stop-btn" disabled>停止实验</button>
                    <button class="control-btn" id="reset-btn">重置</button>
                </div>
                
                <div class="control-group">
                    <label class="control-label">实验速度:</label>
                    <input type="range" class="control-input" id="speed-slider" min="1" max="10" value="5">
                    <span id="speed-display">中等</span>
                </div>
            </div>
            
            <!-- 实验演示区域 -->
            <div class="demo-area">
                
                <!-- 硬币投掷区域 -->
                <div class="coin-area" id="coin-area">
                    <div class="coin" id="coin">?</div>
                </div>
                
                <!-- 频率收敛图表 -->
                <div class="convergence-chart">
                    <canvas id="convergence-canvas" width="800" height="400"></canvas>
                </div>

                <!-- 统计显示 -->
                <div class="statistics-display" id="statistics-display">
                    <div class="stat-item">
                        <div class="stat-label">总次数</div>
                        <div class="stat-value" id="total-count">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">正面次数</div>
                        <div class="stat-value" id="heads-count">0</div>
                        <div class="stat-frequency" id="heads-frequency">0%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">反面次数</div>
                        <div class="stat-value" id="tails-count">0</div>
                        <div class="stat-frequency" id="tails-frequency">0%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">理论概率</div>
                        <div class="stat-value">50%</div>
                        <div class="stat-frequency">各50%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let experimentData = {
            totalCount: 0,
            headsCount: 0,
            tailsCount: 0,
            isRunning: false,
            intervalId: null,
            frequencyHistory: []
        };

        let canvas, ctx;

        // 初始化页面
        function initializePage() {
            canvas = document.getElementById('convergence-canvas');
            ctx = canvas.getContext('2d');
            setupEventListeners();
            updateSpeedDisplay();
            resetExperiment();
            drawChart();
        }

        // 设置事件监听器
        function setupEventListeners() {
            document.getElementById('start-btn').addEventListener('click', startExperiment);
            document.getElementById('stop-btn').addEventListener('click', stopExperiment);
            document.getElementById('reset-btn').addEventListener('click', resetExperiment);
            document.getElementById('speed-slider').addEventListener('input', updateSpeedDisplay);
            document.getElementById('coin').addEventListener('click', flipCoinOnce);
        }

        // 开始实验
        function startExperiment() {
            if (experimentData.isRunning) return;

            experimentData.isRunning = true;
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;

            const targetCount = parseInt(document.getElementById('trial-count').value);
            const speed = parseInt(document.getElementById('speed-slider').value);
            const interval = 1100 - speed * 100; // 速度越快间隔越短

            experimentData.intervalId = setInterval(() => {
                if (experimentData.totalCount >= targetCount) {
                    stopExperiment();
                    return;
                }
                flipCoin();
            }, interval);
        }

        // 停止实验
        function stopExperiment() {
            experimentData.isRunning = false;
            document.getElementById('start-btn').disabled = false;
            document.getElementById('stop-btn').disabled = true;

            if (experimentData.intervalId) {
                clearInterval(experimentData.intervalId);
                experimentData.intervalId = null;
            }
        }

        // 重置实验
        function resetExperiment() {
            stopExperiment();
            experimentData.totalCount = 0;
            experimentData.headsCount = 0;
            experimentData.tailsCount = 0;
            experimentData.frequencyHistory = [];

            document.getElementById('coin').textContent = '?';
            updateStatistics();
            drawChart();
        }

        // 绘制频率收敛图表
        function drawChart() {
            const width = canvas.width;
            const height = canvas.height;
            const margin = 60;

            // 清除画布
            ctx.clearRect(0, 0, width, height);

            // 绘制背景
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, width, height);

            // 绘制坐标轴
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin, height - margin);
            ctx.lineTo(width - margin, height - margin);
            ctx.moveTo(margin, margin);
            ctx.lineTo(margin, height - margin);
            ctx.stroke();

            // 绘制理论值线（50%）
            ctx.strokeStyle = '#dc3545';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            const theoreticalY = height - margin - (0.5 * (height - 2 * margin));
            ctx.beginPath();
            ctx.moveTo(margin, theoreticalY);
            ctx.lineTo(width - margin, theoreticalY);
            ctx.stroke();
            ctx.setLineDash([]);

            // 绘制频率曲线
            if (experimentData.frequencyHistory.length > 1) {
                ctx.strokeStyle = '#667eea';
                ctx.lineWidth = 3;
                ctx.beginPath();

                const maxTrial = Math.max(...experimentData.frequencyHistory.map(d => d.trial));

                experimentData.frequencyHistory.forEach((point, index) => {
                    const x = margin + (point.trial / maxTrial) * (width - 2 * margin);
                    const y = height - margin - (point.frequency * (height - 2 * margin));

                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();
            }

            // 添加标题和标签
            ctx.fillStyle = '#333';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('正面频率收敛图', width / 2, 30);

            ctx.font = '12px Arial';
            ctx.fillText('试验次数', width / 2, height - 10);

            ctx.save();
            ctx.translate(20, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('正面频率', 0, 0);
            ctx.restore();

            // 添加图例
            ctx.fillStyle = '#667eea';
            ctx.fillRect(width - 150, 50, 20, 3);
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('实际频率', width - 125, 55);

            ctx.strokeStyle = '#dc3545';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(width - 150, 70);
            ctx.lineTo(width - 130, 70);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillText('理论概率 (50%)', width - 125, 75);
        }

        // 投掷硬币一次（手动点击）
        function flipCoinOnce() {
            if (!experimentData.isRunning) {
                flipCoin();
            }
        }

        // 投掷硬币
        function flipCoin() {
            const coin = document.getElementById('coin');
            coin.classList.add('flipping');

            // 随机决定正反面
            const isHeads = Math.random() < 0.5;

            setTimeout(() => {
                coin.classList.remove('flipping');

                if (isHeads) {
                    coin.textContent = '正';
                    coin.style.background = 'linear-gradient(135deg, #28a745 0%, #20c997 100%)';
                    experimentData.headsCount++;
                } else {
                    coin.textContent = '反';
                    coin.style.background = 'linear-gradient(135deg, #dc3545 0%, #e83e8c 100%)';
                    experimentData.tailsCount++;
                }

                experimentData.totalCount++;
                updateStatistics();

                // 恢复原色
                setTimeout(() => {
                    coin.style.background = 'linear-gradient(135deg, #ffd700 0%, #ffed4e 100%)';
                }, 500);

            }, 500);
        }

        // 更新统计显示
        function updateStatistics() {
            document.getElementById('total-count').textContent = experimentData.totalCount;
            document.getElementById('heads-count').textContent = experimentData.headsCount;
            document.getElementById('tails-count').textContent = experimentData.tailsCount;

            if (experimentData.totalCount > 0) {
                const headsFreq = (experimentData.headsCount / experimentData.totalCount * 100).toFixed(1);
                const tailsFreq = (experimentData.tailsCount / experimentData.totalCount * 100).toFixed(1);

                document.getElementById('heads-frequency').textContent = headsFreq + '%';
                document.getElementById('tails-frequency').textContent = tailsFreq + '%';

                // 根据频率接近理论值的程度改变颜色
                const headsFreqElement = document.getElementById('heads-frequency');
                const tailsFreqElement = document.getElementById('tails-frequency');

                const headsDeviation = Math.abs(parseFloat(headsFreq) - 50);
                const tailsDeviation = Math.abs(parseFloat(tailsFreq) - 50);

                if (headsDeviation < 5) {
                    headsFreqElement.style.color = '#28a745';
                } else if (headsDeviation < 10) {
                    headsFreqElement.style.color = '#ffc107';
                } else {
                    headsFreqElement.style.color = '#dc3545';
                }

                if (tailsDeviation < 5) {
                    tailsFreqElement.style.color = '#28a745';
                } else if (tailsDeviation < 10) {
                    tailsFreqElement.style.color = '#ffc107';
                } else {
                    tailsFreqElement.style.color = '#dc3545';
                }

                // 记录频率历史
                experimentData.frequencyHistory.push({
                    trial: experimentData.totalCount,
                    frequency: experimentData.headsCount / experimentData.totalCount
                });

                // 更新图表
                drawChart();
            } else {
                document.getElementById('heads-frequency').textContent = '0%';
                document.getElementById('tails-frequency').textContent = '0%';
            }
        }

        // 更新速度显示
        function updateSpeedDisplay() {
            const speed = parseInt(document.getElementById('speed-slider').value);
            const speedTexts = ['很慢', '慢', '较慢', '慢', '中等', '中等', '较快', '快', '很快', '极快'];
            document.getElementById('speed-display').textContent = speedTexts[speed - 1];
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', function() {
            console.log('DOM加载完成，开始初始化页面...');
            
            setTimeout(() => {
                initializePage();
                
                // 初始化MathJax渲染
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch(err => console.warn('MathJax渲染错误:', err));
                }
                
                console.log('频率与概率动画演示虚拟实验室加载完成');
            }, 500);
        });
    </script>
</body>
</html>
