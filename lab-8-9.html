<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中心极限定理动画演示</title>
    <link rel="stylesheet" href="common-assets/css/frame.css">
    <link rel="stylesheet" href="common-assets/css/google-fonts.css">
    <link rel="stylesheet" href="common-assets/css/fonts.css">
    <script src="common-assets/js/math.min.js"></script>
    <script src="common-assets/js/mathjax-config.js"></script>
    <script src="common-assets/js/tex-svg.js"></script>
    <script src="common-assets/js/plotly.min.js"></script>
    <style>
        /* CSS变量定义 */
        :root {
            --h1-size: 24px;
            --h2-size: 20px;
            --h3-size: 18px;
            --btn-size: 16px;
            --formula-size: 16px;
            --text-size: 16px;

            /* 现代化配色方案 */
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --primary-dark: #3730a3;
            --secondary: #7c3aed;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --gray-900: #111827;

            /* 间距 */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;

            /* 圆角 */
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 16px;

            /* 阴影 */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Source Han Serif SC', 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--spacing-lg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
            color: var(--light);
        }

        .header h1 {
            font-size: var(--h1-size);
            margin: 0 0 var(--spacing-sm) 0;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: var(--text-size);
            margin: 0;
            opacity: 0.9;
        }

        /* 左右分布布局 */
        .interactive-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
            height: 100%;
            flex: 1;
        }

        .left-panel, .right-panel {
            background: var(--light);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
        }

        .left-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--light);
        }

        .right-panel {
            background: var(--light);
            color: var(--gray-800);
        }

        /* 控制面板 */
        .control-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            backdrop-filter: blur(10px);
        }

        .control-group {
            margin-bottom: var(--spacing-md);
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-label {
            display: block;
            font-size: var(--text-size);
            font-weight: 500;
            margin-bottom: var(--spacing-sm);
            color: var(--light);
        }

        .control-input {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
            font-size: var(--text-size);
            transition: all 0.3s ease;
        }

        .control-input:focus {
            outline: none;
            border-color: var(--light);
            background: rgba(255, 255, 255, 0.2);
        }

        .control-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .btn {
            background: var(--primary);
            color: var(--light);
            border: none;
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: var(--radius-sm);
            font-size: var(--btn-size);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--secondary);
        }

        .btn-secondary:hover {
            background: #6d28d9;
        }

        /* 可视化区域 */
        .visualization {
            flex: 1;
            background: var(--light);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .visualization h3 {
            margin: 0 0 var(--spacing-md) 0;
            font-size: var(--h3-size);
            color: var(--gray-800);
            text-align: center;
        }

        #cltChart {
            width: 100%;
            height: 400px;
        }

        /* 统计信息显示 */
        .stats-display {
            background: var(--gray-50);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
            border-left: 4px solid var(--primary);
            color: #10b981;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
            margin-top: var(--spacing-md);
        }

        .stat-item {
            background: var(--light);
            padding: var(--spacing-sm);
            border-radius: var(--radius-sm);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--gray-600);
            margin-top: var(--spacing-xs);
        }

        /* 动画效果 */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .interactive-layout {
                grid-template-columns: 1fr;
                gap: var(--spacing-md);
            }
            
            .container {
                padding: var(--spacing-md);
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>中心极限定理动画演示</h1>
            <p>通过交互式可视化理解中心极限定理的原理</p>
        </div>

        <div class="interactive-layout">
            <!-- 左侧控制面板 -->
            <div class="left-panel">
                <div class="control-panel">
                    <div class="control-group">
                        <label class="control-label">样本大小 n</label>
                        <input type="range" class="control-input" id="sampleSize" min="1" max="50" step="1" value="10">
                        <span id="sampleSizeValue">10</span>
                    </div>
                    
                    <div class="control-group">
                        <label class="control-label">样本数量</label>
                        <input type="range" class="control-input" id="numSamples" min="100" max="10000" step="100" value="1000">
                        <span id="numSamplesValue">1000</span>
                    </div>
                    
                    <div class="control-group">
                        <label class="control-label">分布类型</label>
                        <select class="control-input" id="distributionType">
                            <option value="uniform">均匀分布</option>
                            <option value="exponential">指数分布</option>
                            <option value="binomial">二项分布</option>
                        </select>
                    </div>
                    
                    <div class="control-group">
                        <button class="btn" onclick="updateVisualization()">更新可视化</button>
                        <button class="btn btn-secondary" onclick="resetValues()">重置</button>
                    </div>
                </div>

                <div class="stats-display">
                    <h3>中心极限定理</h3>
                    <p>当样本大小足够大时，样本均值的分布近似正态分布，无论原始分布是什么形状。</p>
                    
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="sampleMean">0.00</div>
                            <div class="stat-label">样本均值</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="sampleStd">0.00</div>
                            <div class="stat-label">样本标准差</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="theoreticalMean">0.00</div>
                            <div class="stat-label">理论均值</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="theoreticalStd">0.00</div>
                            <div class="stat-label">理论标准差</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧可视化区域 -->
            <div class="right-panel">
                <div class="visualization">
                    <h3>样本均值分布</h3>
                    <div id="cltChart"></div>
                    
                    <div class="stats-display">
                        <h4>定理说明</h4>
                        <p id="cltExplanation">
                            中心极限定理表明，对于任何具有有限均值和方差的分布，
                            当样本大小n足够大时，样本均值的分布将近似于正态分布。
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化可视化
        function initVisualization() {
            updateVisualization();
        }

        // 生成随机数据
        function generateRandomData(distributionType, size) {
            const data = [];
            for (let i = 0; i < size; i++) {
                switch (distributionType) {
                    case 'uniform':
                        data.push(Math.random() * 2 - 1); // [-1, 1]
                        break;
                    case 'exponential':
                        data.push(-Math.log(1 - Math.random()) / 2); // λ = 2
                        break;
                    case 'binomial':
                        data.push(Math.random() < 0.3 ? 1 : 0); // p = 0.3
                        break;
                }
            }
            return data;
        }

        // 计算统计量
        function calculateStats(data) {
            const mean = data.reduce((sum, x) => sum + x, 0) / data.length;
            const variance = data.reduce((sum, x) => sum + Math.pow(x - mean, 2), 0) / data.length;
            const std = Math.sqrt(variance);
            return { mean, std };
        }

        // 更新可视化
        function updateVisualization() {
            const sampleSize = parseInt(document.getElementById('sampleSize').value);
            const numSamples = parseInt(document.getElementById('numSamples').value);
            const distributionType = document.getElementById('distributionType').value;
            
            // 更新显示值
            document.getElementById('sampleSizeValue').textContent = sampleSize;
            document.getElementById('numSamplesValue').textContent = numSamples;
            
            // 生成样本均值
            const sampleMeans = [];
            for (let i = 0; i < numSamples; i++) {
                const sample = generateRandomData(distributionType, sampleSize);
                const stats = calculateStats(sample);
                sampleMeans.push(stats.mean);
            }
            
            // 计算统计量
            const sampleStats = calculateStats(sampleMeans);
            
            // 理论值
            let theoreticalMean, theoreticalStd;
            switch (distributionType) {
                case 'uniform':
                    theoreticalMean = 0;
                    theoreticalStd = Math.sqrt(4/12) / Math.sqrt(sampleSize); // σ/√n
                    break;
                case 'exponential':
                    theoreticalMean = 0.5;
                    theoreticalStd = 0.5 / Math.sqrt(sampleSize);
                    break;
                case 'binomial':
                    theoreticalMean = 0.3;
                    theoreticalStd = Math.sqrt(0.3 * 0.7) / Math.sqrt(sampleSize);
                    break;
            }
            
            // 更新统计显示
            document.getElementById('sampleMean').textContent = sampleStats.mean.toFixed(3);
            document.getElementById('sampleStd').textContent = sampleStats.std.toFixed(3);
            document.getElementById('theoreticalMean').textContent = theoreticalMean.toFixed(3);
            document.getElementById('theoreticalStd').textContent = theoreticalStd.toFixed(3);
            
            // 更新解释
            updateExplanation(distributionType, sampleSize, sampleStats, theoreticalMean, theoreticalStd);
            
            // 创建图表
            createCLTChart(sampleMeans, theoreticalMean, theoreticalStd);
        }

        // 更新解释
        function updateExplanation(distributionType, sampleSize, sampleStats, theoreticalMean, theoreticalStd) {
            const explanation = document.getElementById('cltExplanation');
            const distributionNames = {
                'uniform': '均匀分布',
                'exponential': '指数分布',
                'binomial': '二项分布'
            };
            
            explanation.innerHTML = `
                <p><strong>当前设置：</strong></p>
                <ul>
                    <li>分布类型：${distributionNames[distributionType]}</li>
                    <li>样本大小：${sampleSize}</li>
                    <li>样本数量：${document.getElementById('numSamples').value}</li>
                </ul>
                <p><strong>观察结果：</strong></p>
                <p>样本均值：${sampleStats.mean.toFixed(3)} ≈ 理论均值：${theoreticalMean.toFixed(3)}</p>
                <p>样本标准差：${sampleStats.std.toFixed(3)} ≈ 理论标准差：${theoreticalStd.toFixed(3)}</p>
                <p>随着样本大小增加，样本均值的分布越来越接近正态分布。</p>
            `;
        }

        // 创建中心极限定理图表
        function createCLTChart(sampleMeans, theoreticalMean, theoreticalStd) {
            // 创建直方图数据
            const bins = 30;
            const min = Math.min(...sampleMeans);
            const max = Math.max(...sampleMeans);
            const binWidth = (max - min) / bins;
            
            const histogram = new Array(bins).fill(0);
            const binCenters = [];
            
            for (let i = 0; i < bins; i++) {
                binCenters.push(min + (i + 0.5) * binWidth);
            }
            
            sampleMeans.forEach(mean => {
                const binIndex = Math.min(Math.floor((mean - min) / binWidth), bins - 1);
                histogram[binIndex]++;
            });
            
            // 归一化直方图
            const normalizedHistogram = histogram.map(count => count / sampleMeans.length / binWidth);
            
            // 理论正态分布
            const normalX = [];
            const normalY = [];
            for (let i = 0; i < 100; i++) {
                const x = min + (max - min) * i / 99;
                normalX.push(x);
                const y = (1 / (theoreticalStd * Math.sqrt(2 * Math.PI))) * 
                         Math.exp(-0.5 * Math.pow((x - theoreticalMean) / theoreticalStd, 2));
                normalY.push(y);
            }
            
            const data = [
                {
                    x: binCenters,
                    y: normalizedHistogram,
                    type: 'bar',
                    name: '样本均值分布',
                    marker: {
                        color: 'rgba(79, 70, 229, 0.6)',
                        line: {
                            color: 'rgba(79, 70, 229, 0.8)',
                            width: 1
                        }
                    }
                },
                {
                    x: normalX,
                    y: normalY,
                    type: 'scatter',
                    mode: 'lines',
                    name: '理论正态分布',
                    line: {
                        color: '#ef4444',
                        width: 3
                    }
                }
            ];

            const layout = {
                title: {
                    text: '样本均值分布 vs 理论正态分布',
                    font: { size: 16, color: '#1f2937' }
                },
                xaxis: {
                    title: '样本均值',
                    titlefont: { size: 14, color: '#4b5563' },
                    tickfont: { size: 12, color: '#6b7280' }
                },
                yaxis: {
                    title: '密度',
                    titlefont: { size: 14, color: '#4b5563' },
                    tickfont: { size: 12, color: '#6b7280' }
                },
                margin: { t: 60, r: 30, b: 60, l: 60 },
                plot_bgcolor: 'rgba(0,0,0,0)',
                paper_bgcolor: 'rgba(0,0,0,0)',
                font: { family: 'Source Han Serif SC, Noto Serif SC, serif' },
                legend: {
                    x: 0.7,
                    y: 0.9
                }
            };

            const config = {
                responsive: true,
                displayModeBar: false
            };

            Plotly.newPlot('cltChart', data, layout, config);
        }

        // 重置值
        function resetValues() {
            document.getElementById('sampleSize').value = 10;
            document.getElementById('numSamples').value = 1000;
            document.getElementById('distributionType').value = 'uniform';
            updateVisualization();
        }

        // 事件监听器
        document.getElementById('sampleSize').addEventListener('input', updateVisualization);
        document.getElementById('numSamples').addEventListener('input', updateVisualization);
        document.getElementById('distributionType').addEventListener('change', updateVisualization);

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initVisualization();
        });
    </script>
</body>
</html>
